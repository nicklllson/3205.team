services:
  server:
    build: ./server
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - '5173:5173'
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - server
